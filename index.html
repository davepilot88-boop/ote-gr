<!DOCTYPE html>
<html lang="cs">
<head>
<link rel="apple-touch-icon" href="graf.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Vývoj spotových cen/title>
  <style>
    :root{
      --bg:#f5f7fb; --card:#ffffff; --text:#18212f; --muted:#667085; --line:#d9e0ea;
      --accent:#2463eb; --good:#1f9d55; --warn:#f79009; --bad:#d92d20; --radius:18px;
      --shadow:0 10px 30px rgba(16,24,40,.08);
      --current-ring:#111827; --current-glow:#fde047;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0f1722; --card:#182230; --text:#eef2f7; --muted:#a0acbd; --line:#2b3645;
        --accent:#77a7ff; --good:#3ddc84; --warn:#ffb547; --bad:#ff7369; --shadow:0 10px 30px rgba(0,0,0,.25);
        --current-ring:#fff; --current-glow:#facc15;
      }
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    .app{max-width:980px;margin:0 auto;padding:max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom))}
    .header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}
    h1{font-size:32px;margin:0 0 4px;line-height:1.05}
    .subtitle{color:var(--muted);margin:0}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
    .badge{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;background:rgba(36,99,235,.12);color:var(--accent)}
    .note{color:var(--muted);font-size:14px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{appearance:none;border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--card);color:var(--text);font-weight:700;cursor:pointer}
    .segment{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:rgba(128,128,128,.08);padding:6px;border-radius:14px}
    .seg-btn{appearance:none;border:0;border-radius:10px;padding:12px 10px;background:transparent;font-weight:700;color:var(--text);cursor:pointer;font-size:16px}
    .seg-btn.active{background:var(--card);box-shadow:0 3px 10px rgba(0,0,0,.12)}
    .seg-btn.disabled{opacity:.5}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    @media(min-width:760px){.stats{grid-template-columns:repeat(4,minmax(0,1fr))}}
    .stat{border:1px solid var(--line);border-radius:14px;padding:14px;background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.02))}
    .label{color:var(--muted);font-size:13px;margin-bottom:6px}
    .value{font-size:26px;font-weight:800;letter-spacing:-.02em}
    .chart-panel{position:relative}
    .chart-wrap{overflow-x:auto;padding-bottom:6px}
    .chart{
      height:300px;min-width:780px;display:flex;flex-wrap:nowrap;align-items:flex-end;gap:6px;
      padding:18px 4px 34px;border-bottom:1px solid var(--line)
    }
    .bar-col{flex:1 0 24px;min-width:24px;max-width:32px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative}
    .bar-hit{width:100%;display:flex;justify-content:center;align-items:flex-end;height:100%;cursor:pointer;touch-action:manipulation}
    .bar{width:100%;border-radius:10px 10px 4px 4px;background:var(--accent);position:relative;min-height:2px;transition:transform .12s ease}
    .bar-col:hover .bar,.bar-col.active .bar{transform:translateY(-2px)}
    .bar.good{background:var(--good)} .bar.warn{background:var(--warn)} .bar.bad{background:var(--bad)}
    .bar.current{outline:4px solid var(--current-ring);box-shadow:0 0 0 4px var(--current-glow);z-index:2}
    .bar-val{font-size:11px;color:var(--muted);white-space:nowrap}
    .bar-label{position:absolute;bottom:-26px;font-size:11px;color:var(--muted)}
    .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
    .legend span{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted)}
    .dot{width:12px;height:12px;border-radius:999px;display:inline-block}
    .tooltip{position:absolute;top:8px;left:8px;right:8px;min-height:58px;border:1px solid var(--line);background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-radius:14px;padding:10px 12px;display:grid;gap:2px}
    @media (prefers-color-scheme: dark){.tooltip{background:rgba(24,34,48,.92)}}
    .tooltip .small{font-size:13px;color:var(--muted)} .tooltip .big{font-size:20px;font-weight:800}
    .summary{display:grid;gap:10px}
    .summary-item{padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:rgba(128,128,128,.04)}
    .summary-item strong{display:block;margin-bottom:2px}
    .table{width:100%;border-collapse:collapse;font-size:15px}
    .table th,.table td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left}
    .table td:last-child,.table th:last-child{text-align:right;font-variant-numeric:tabular-nums}
    .red{color:var(--bad);font-weight:700} .orange{color:var(--warn);font-weight:700} .green{color:var(--good);font-weight:700}
    .controls{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:760px){.controls{grid-template-columns:repeat(3,1fr)}}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    .field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text);font-size:16px}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>OTE Cena</h1>
      <p class="subtitle">Opravená verze s přepínačem Dnes / Zítra</p>
    </div>
    <span class="badge" id="statusBadge">Připraveno</span>
  </div>

  <div class="card">
    <div class="segment">
      <button class="seg-btn active" id="todayBtn">Dnes</button>
      <button class="seg-btn" id="tomorrowBtn">Zítra</button>
    </div>
    <p class="note" id="dayInfo" style="margin:12px 4px 0;">Zobrazený den: dnes</p>
  </div>

  <div class="card">
    <div class="toolbar">
      <button class="btn" id="loadBtn">Načíst aktuální OTE</button>
      <button class="btn" id="refreshBtn">Obnovit výpočet</button>
      <span class="note" id="sourceInfo">Zatím zobrazeny uložené hodnoty.</span>
    </div>
  </div>

  <div class="card chart-panel">
    <div class="tooltip" id="tooltip">
      <div class="small">Klepni nebo najeď na sloupec</div>
      <div class="big">Zobrazí se detail hodiny</div>
    </div>
    <div id="chartArea">
      <div class="chart-wrap"><div class="chart" id="chart"></div></div>
      <div class="legend">
        <span><i class="dot" style="background:var(--good)"></i> nad limitem</span>
        <span><i class="dot" style="background:var(--warn)"></i> nízký zisk</span>
        <span><i class="dot" style="background:var(--bad)"></i> pod limitem / ztráta</span>
      </div>
      <p class="note" style="margin-top:12px;">Číslo nad sloupcem je čistý výsledek v Kč/MWh. Aktuální hodina je zvýrazněná.</p>
    </div>
    <div id="noTomorrow" class="hidden">
      <p style="font-size:22px;font-weight:800;margin:8px 0;">Zítřejší ceny zatím nejsou zveřejněny.</p>
      <p class="note">Jakmile OTE vydá data pro zítřek, klepni na „Načíst aktuální OTE“ a graf se doplní.</p>
    </div>
  </div>

  <div class="card">
    <div class="stats">
      <div class="stat"><div class="label">Nejhorší čistý výsledek</div><div class="value" id="minNetVal">–</div></div>
      <div class="stat"><div class="label">Nejlepší čistý výsledek</div><div class="value" id="maxNetVal">–</div></div>
      <div class="stat"><div class="label">Průměrný čistý výsledek</div><div class="value" id="avgNetVal">–</div></div>
      <div class="stat"><div class="label">Teď čistý výsledek</div><div class="value" id="nowNetVal">–</div></div>
    </div>
  </div>

  <div class="card"><div class="summary" id="summary"></div></div>

  <div class="card">
    <h3 style="margin:0 0 12px;">Hodinové ceny a čistý výsledek</h3>
    <div style="overflow:auto">
      <table class="table">
        <thead>
          <tr><th>Hodina</th><th>Spot cena (EUR/MWh)</th><th>Čistý výsledek (Kč/MWh)</th></tr>
        </thead>
        <tbody id="priceTable"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="controls">
      <div class="field">
        <label for="feeInput">Poplatek za 1 MWh (Kč)</label>
        <input id="feeInput" type="number" step="1" value="500" />
      </div>
      <div class="field">
        <label for="fxInput">Kurz EUR/CZK</label>
        <input id="fxInput" type="number" step="0.01" value="25.00" />
      </div>
      <div class="field">
        <label for="thresholdInput">Červená od čistého výsledku pod (Kč/MWh)</label>
        <input id="thresholdInput" type="number" step="1" value="0" />
      </div>
    </div>
  </div>
</div>

<script>
const initialToday = { date:"29.03.2026", source:"Ruční uložené hodnoty", prices:[115.62,109.04,107.88,105.80,112.18,109.33,109.93,115.00,114.91,96.22,78.03,70.59,70.42,39.56,18.10,19.23,26.26,68.38,100.77,122.10,114.31,98.36,95.91,85.00] };
let state = loadSavedData() || { today: initialToday, tomorrow: null };
let selectedDay = "today";
let activeHour = null;

function fmtEur(v){ return `${(Math.round(v*100)/100).toLocaleString("cs-CZ")} €`; }
function fmtCzk(v){ return `${Math.round(v).toLocaleString("cs-CZ")} Kč`; }
function hourRange(hour){ const next=(hour+1)%24; return `${String(hour).padStart(2,"0")}:00–${String(next).padStart(2,"0")}:00`; }
function readInputs(){ return { fee:Number(feeInput.value||0), fx:Number(fxInput.value||0), threshold:Number(thresholdInput.value||0) }; }
function computeNet(prices, fee, fx){ return prices.map(v => (v*fx)-fee); }
function calcStats(arr){ const min=Math.min(...arr), max=Math.max(...arr), avg=arr.reduce((a,b)=>a+b,0)/arr.length, nowHour=new Date().getHours(), nowVal=arr[Math.min(nowHour,23)]; return {min,max,avg,nowVal,minHour:arr.indexOf(min),maxHour:arr.indexOf(max)}; }
function clsForValue(v, threshold){ if(v<threshold) return "bad"; if(v<threshold+500) return "warn"; return "good"; }
function txtCls(v, threshold){ if(v<threshold) return "red"; if(v<threshold+500) return "orange"; return "green"; }
function countBelow(arr, threshold){ return arr.filter(v=>v<threshold).length; }
function setBadge(text){ statusBadge.textContent=text; }
function saveData(data){ localStorage.setItem("ote_prices_day_switch_v1", JSON.stringify(data)); }
function loadSavedData(){ try{ const raw=localStorage.getItem("ote_prices_day_switch_v1"); return raw?JSON.parse(raw):null; }catch{return null;} }
function setTooltip(hour, spot, net){
  if(hour==null){ tooltip.innerHTML=`<div class="small">Klepni nebo najeď na sloupec</div><div class="big">Zobrazí se detail hodiny</div>`; return; }
  tooltip.innerHTML=`<div class="small">${hourRange(hour)}</div><div class="big">Spot: ${fmtEur(spot)} · Čistý výsledek: ${fmtCzk(net)}</div>`;
}
function render(){
  todayBtn.classList.toggle("active", selectedDay==="today");
  tomorrowBtn.classList.toggle("active", selectedDay==="tomorrow");
  dayInfo.textContent = `Zobrazený den: ${selectedDay==="today" ? "dnes" : "zítra"}`;

  const selected = state[selectedDay];
  if(!selected){
    chartArea.classList.add("hidden");
    noTomorrow.classList.remove("hidden");
    minNetVal.textContent = maxNetVal.textContent = avgNetVal.textContent = nowNetVal.textContent = "–";
    summary.innerHTML = "";
    priceTable.innerHTML = "";
    sourceInfo.textContent = "Zdroj: zítřek zatím není k dispozici";
    setTooltip(null);
    return;
  }

  chartArea.classList.remove("hidden");
  noTomorrow.classList.add("hidden");
  sourceInfo.textContent = `Zdroj: ${selected.source} · Datum dat: ${selected.date}`;

  const {fee, fx, threshold} = readInputs();
  const prices = selected.prices;
  const net = computeNet(prices, fee, fx);
  const stats = calcStats(net);
  const currentHour = new Date().getHours();

  minNetVal.textContent = fmtCzk(stats.min);
  maxNetVal.textContent = fmtCzk(stats.max);
  avgNetVal.textContent = fmtCzk(stats.avg);
  nowNetVal.textContent = selectedDay==="today" ? fmtCzk(stats.nowVal) : "–";

  chart.innerHTML = "";
  const maxAbs = Math.max(...net.map(v=>Math.abs(v)),1);

  net.forEach((value, hour) => {
    const col = document.createElement("div");
    col.className = "bar-col" + (activeHour===hour ? " active" : "");

    const val = document.createElement("div");
    val.className = "bar-val";
    val.textContent = Math.round(value);

    const hit = document.createElement("div");
    hit.className = "bar-hit";

    const bar = document.createElement("div");
    bar.className = "bar " + clsForValue(value, threshold);
    bar.style.height = `${Math.max(6, Math.round((Math.abs(value)/maxAbs)*190))}px`;
    if(selectedDay==="today" && hour===currentHour) bar.classList.add("current");

    const label = document.createElement("div");
    label.className = "bar-label";
    label.textContent = hour;

    const activate = () => {
      activeHour = hour;
      setTooltip(hour, prices[hour], net[hour]);
      document.querySelectorAll(".bar-col").forEach((n, idx) => n.classList.toggle("active", idx===hour));
    };

    hit.addEventListener("mouseenter", activate);
    hit.addEventListener("click", activate);
    hit.addEventListener("touchstart", activate, {passive:true});

    bar.appendChild(label);
    hit.appendChild(bar);
    col.appendChild(val);
    col.appendChild(hit);
    chart.appendChild(col);
  });

  summary.innerHTML = `
    <div class="summary-item"><strong>Nejhorší hodina</strong>${hourRange(stats.minHour)} (${fmtCzk(stats.min)})</div>
    <div class="summary-item"><strong>Nejlepší hodina</strong>${hourRange(stats.maxHour)} (${fmtCzk(stats.max)})</div>
    <div class="summary-item"><strong>Hodin pod zvoleným limitem</strong>${countBelow(net, threshold)} hod. pod ${fmtCzk(threshold)}</div>
    <div class="summary-item"><strong>Skutečně ztrátové hodiny</strong>${countBelow(net, 0)} hod. pod 0 Kč/MWh při poplatku ${fmtCzk(fee)} a kurzu ${fx.toLocaleString("cs-CZ")}</div>
  `;

  priceTable.innerHTML = prices.map((spot, hour) => {
    const netVal = net[hour];
    return `<tr><td>${hourRange(hour)}</td><td>${fmtEur(spot)}</td><td class="${txtCls(netVal, threshold)}">${fmtCzk(netVal)}</td></tr>`;
  }).join("");

  const defaultHour = selectedDay==="today" ? Math.min(currentHour,23) : 12;
  if(activeHour == null || activeHour > 23){
    activeHour = defaultHour;
  }
  setTooltip(activeHour, prices[activeHour], net[activeHour]);
  const selectedCol = document.querySelectorAll(".bar-col")[activeHour];
  if(selectedCol) selectedCol.classList.add("active");
}

todayBtn.addEventListener("click", ()=>{ selectedDay="today"; activeHour=null; render(); });
tomorrowBtn.addEventListener("click", ()=>{ selectedDay="tomorrow"; activeHour=null; render(); });
refreshBtn.addEventListener("click", render);
["feeInput","fxInput","thresholdInput"].forEach(id => document.getElementById(id).addEventListener("input", render));

render();
</script>
</body>
</html>
